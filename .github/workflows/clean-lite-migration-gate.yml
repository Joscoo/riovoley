name: Clean Lite Migration Gate

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

jobs:
  quality-gate:
    name: Contracts + Build + Public Smoke
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run copy quality check
        run: npm run check:copy-quality

      - name: Install Playwright Chromium
        run: npx playwright install chromium

      - name: Run edge contract tests
        run: npm run test:contracts

      - name: Run public smoke tests
        run: npm run e2e:smoke:public

      - name: Build
        run: npm run build

  roles-smoke:
    name: Roles Smoke (Optional)
    runs-on: ubuntu-latest
    needs: quality-gate
    env:
      E2E_ADMIN_EMAIL: ${{ secrets.E2E_ADMIN_EMAIL }}
      E2E_ADMIN_PASSWORD: ${{ secrets.E2E_ADMIN_PASSWORD }}
      E2E_TRAINER_EMAIL: ${{ secrets.E2E_TRAINER_EMAIL }}
      E2E_TRAINER_PASSWORD: ${{ secrets.E2E_TRAINER_PASSWORD }}
      E2E_STUDENT_EMAIL: ${{ secrets.E2E_STUDENT_EMAIL }}
      E2E_STUDENT_PASSWORD: ${{ secrets.E2E_STUDENT_PASSWORD }}

    steps:
      - name: Check required E2E secrets
        id: e2e_secrets
        shell: bash
        run: |
          missing=0
          for key in E2E_ADMIN_EMAIL E2E_ADMIN_PASSWORD E2E_TRAINER_EMAIL E2E_TRAINER_PASSWORD E2E_STUDENT_EMAIL E2E_STUDENT_PASSWORD; do
            if [ -z "${!key}" ]; then
              echo "Missing secret: $key"
              missing=1
            fi
          done

          if [ "$missing" -eq 1 ]; then
            echo "run_roles=false" >> "$GITHUB_OUTPUT"
            echo "Roles smoke will be skipped."
          else
            echo "run_roles=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        if: steps.e2e_secrets.outputs.run_roles == 'true'
        uses: actions/checkout@v4

      - name: Setup Node
        if: steps.e2e_secrets.outputs.run_roles == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        if: steps.e2e_secrets.outputs.run_roles == 'true'
        run: npm ci

      - name: Install Playwright Chromium
        if: steps.e2e_secrets.outputs.run_roles == 'true'
        run: npx playwright install chromium

      - name: Run roles smoke strict
        if: steps.e2e_secrets.outputs.run_roles == 'true'
        run: npm run e2e:smoke:roles:strict
